version: '3.8'

services:
  # Infrastructure
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-craft_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-craft_password}
      POSTGRES_DB: ${POSTGRES_DB:-craft_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-craft_user} -d ${POSTGRES_DB:-craft_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    restart: unless-stopped

  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.file.directory=/etc/traefik/conf"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./gateway:/etc/traefik/conf
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # Microservices
  auth_service:
    build: ./services/auth-service
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  catalog_service:
    build: ./services/catalog-service
    ports:
      - "8002:8002"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  order_service:
    build: ./services/order-service
    ports:
      - "8003:8003"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  payment_service:
    build: ./services/payment-service
    ports:
      - "8004:8004"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  platform_service:
    build: ./services/platform-service
    ports:
      - "8005:8005"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ml_service:
    build: ./services/ml-service
    ports:
      - "8006:8006"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  reporting_service:
    build: ./services/reporting-service
    ports:
      - "8007:8007"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  realtime_service:
    build: ./services/realtime-service
    ports:
      - "8008:8008"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
