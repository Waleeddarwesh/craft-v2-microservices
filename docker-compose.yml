version: '3.8'

services:
  # Infrastructure
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-craft_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-craft_password}
      POSTGRES_DB: ${POSTGRES_DB:-craft_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-craft_user} -d ${POSTGRES_DB:-craft_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    restart: unless-stopped

  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.file.directory=/etc/traefik/conf"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "8000:80"
      - "8080:8080"
    volumes:
      - ./gateway:/etc/traefik/conf
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - 8081:80
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # Microservices
  admin_service:
    networks:
      default:
        aliases:
          - admin-service
    build:
      context: ./services/admin-service
      dockerfile: Dockerfile
    environment:
      - OTEL_SERVICE_NAME=admin_service
      - DJANGO_SETTINGS_MODULE=Handcrafts.settings
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=False
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/admin-service/media:/app/media
    restart: unless-stopped
  auth_service:
    networks:
      default:
        aliases:
          - auth-service
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - OTEL_SERVICE_NAME=auth_service
      - DJANGO_SETTINGS_MODULE=auth_service.settings
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  catalog_service:
    networks:
      default:
        aliases:
          - catalog-service
    build:
      context: .
      dockerfile: ./services/catalog-service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - OTEL_SERVICE_NAME=catalog_service
      - DJANGO_SETTINGS_MODULE=catalog_service.settings
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  order_service:
    networks:
      default:
        aliases:
          - order-service
    build:
      context: .
      dockerfile: ./services/order-service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - OTEL_SERVICE_NAME=order_service
      - DJANGO_SETTINGS_MODULE=order_service.settings
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  payment_service:
    networks:
      default:
        aliases:
          - payment-service
    build:
      context: .
      dockerfile: ./services/payment-service/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - OTEL_SERVICE_NAME=payment_service
      - DJANGO_SETTINGS_MODULE=payment_service.settings
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  platform_service:
    networks:
      default:
        aliases:
          - platform-service
    build:
      context: .
      dockerfile: ./services/platform-service/Dockerfile
    ports:
      - "8005:8005"
    environment:
      - OTEL_SERVICE_NAME=platform_service
      - DJANGO_SETTINGS_MODULE=platform_service.settings
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ml_service:
    networks:
      default:
        aliases:
          - ml-service
    build:
      context: .
      dockerfile: ./services/ml-service/Dockerfile
    ports:
      - "8006:8006"
    environment:
      - OTEL_SERVICE_NAME=ml_service
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  reporting_service:
    networks:
      default:
        aliases:
          - reporting-service
    build:
      context: .
      dockerfile: ./services/reporting-service/Dockerfile
    ports:
      - "8007:8007"
    environment:
      - OTEL_SERVICE_NAME=reporting_service
      - DJANGO_SETTINGS_MODULE=reporting_service.settings
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  realtime_service:
    build:
      context: .
      dockerfile: ./services/realtime-service/Dockerfile
    ports:
      - "8008:8008"
    environment:
      - OTEL_SERVICE_NAME=realtime_service
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:

