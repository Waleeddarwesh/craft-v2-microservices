global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'auth-service'
    metrics_path: '/metrics/'
    static_configs:
      - targets: ['auth_service:8001']

  - job_name: 'catalog-service'
    metrics_path: '/metrics/'
    static_configs:
      - targets: ['catalog_service:8002']

  - job_name: 'order-service'
    metrics_path: '/metrics/'
    static_configs:
      - targets: ['order_service:8003']

  - job_name: 'payment-service'
    metrics_path: '/metrics/'
    static_configs:
      - targets: ['payment_service:8004']

  - job_name: 'platform-service'
    metrics_path: '/metrics/'
    static_configs:
      - targets: ['platform_service:8005']

  - job_name: 'ml-service'
    metrics_path: '/metrics/'
    static_configs:
      - targets: ['ml_service:8006']

  - job_name: 'reporting-service'
    metrics_path: '/metrics/'
    static_configs:
      - targets: ['reporting_service:8007']

  - job_name: 'realtime-service'
    metrics_path: '/metrics/'
    static_configs:
      - targets: ['realtime_service:8008']
