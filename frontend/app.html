<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Craft Dashboard — Manage orders, products, users, and more">
    <title>Craft Dashboard</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>
        /* Apply saved theme immediately to prevent flash */
        (function(){var t=localStorage.getItem('craft_theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();
    </script>
</head>
<body>
    <div class="app-layout" id="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar"></aside>

        <!-- Main Area -->
        <div class="main-area">
            <!-- Topbar -->
            <header class="topbar" id="topbar"></header>

            <!-- Page Content -->
            <main class="main-content" id="main-content">
                <div class="page-loader">
                    <div class="spinner spinner-lg"></div>
                    <p>Loading dashboard...</p>
                </div>
            </main>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Modal Container -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal-content"></div>
    </div>

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:250" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.style.display='none'"></div>

    <!-- Core Scripts -->
    <script src="js/i18n.js?v=2"></script>
    <script src="js/auth.js?v=2"></script>
    <script src="js/theme.js?v=2"></script>
    <script src="js/api.js?v=2"></script>
    <script src="js/router.js?v=2"></script>
    <script src="js/components/toast.js?v=2"></script>
    <script src="js/components/modal.js?v=2"></script>
    <script src="js/components/sidebar.js?v=2"></script>
    <script src="js/components/topbar.js?v=2"></script>
    <script src="js/components/stats-card.js?v=2"></script>
    <script src="js/components/table.js?v=2"></script>
    <script src="js/components/charts.js?v=2"></script>
    <script src="js/components/shortcuts.js?v=2"></script>
    <script src="js/components/export.js?v=2"></script>
    <script src="js/pages/overview.js?v=2"></script>
    <script src="js/pages/orders.js?v=2"></script>
    <script src="js/pages/returns.js?v=2"></script>
    <script src="js/pages/products.js?v=2"></script>
    <script src="js/pages/users.js?v=2"></script>
    <script src="js/pages/payments.js?v=2"></script>
    <script src="js/pages/withdrawals.js?v=2"></script>
    <script src="js/pages/courses.js?v=2"></script>
    <script src="js/pages/reviews.js?v=2"></script>
    <script src="js/pages/coupons.js?v=2"></script>
    <script src="js/pages/reports.js?v=2"></script>
    <script src="js/pages/notifications.js?v=2"></script>
    <script src="js/pages/support-tickets.js?v=2"></script>
    <script src="js/pages/disputes.js?v=2"></script>
    <script src="js/pages/audit-logs.js?v=2"></script>
    <script src="js/pages/settings.js?v=2"></script>
    <script src="js/pages/supplier-performance.js?v=2"></script>
    <script src="js/pages/delivery-performance.js?v=2"></script>
    <script src="js/pages/reconciliation.js?v=2"></script>
    <script src="js/pages/fraud-alerts.js?v=2"></script>
    <script src="js/pages/product-moderation.js?v=2"></script>
    <script src="js/app.js?v=2"></script>
</body>
</html>
