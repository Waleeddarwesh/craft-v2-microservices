<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Craft Dashboard — Sign in to manage your marketplace">
    <title>Craft Dashboard — Sign In</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
    <script>(function(){var t=localStorage.getItem('craft_theme')||'dark';document.documentElement.setAttribute('data-theme',t)})()</script>
</head>
<body>
    <div class="login-page" id="login-page">
        <div class="login-card">
            <div class="login-brand">
                <img src="logo.jpg" alt="Craft" class="login-brand-logo">
                <h1>Craft Dashboard</h1>
                <p>Sign in to manage your marketplace</p>
            </div>
            <div id="login-error" class="login-error hidden"></div>
            <form class="login-form" id="login-form" autocomplete="on">
                <div class="form-group">
                    <label class="form-label" for="login-email">Email Address</label>
                    <input class="form-input" type="email" id="login-email" name="email" placeholder="admin@craft.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    <input class="form-input" type="password" id="login-password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn" id="login-btn">
                    <span id="login-btn-text">Sign In</span>
                </button>
            </form>
        </div>
    </div>
    <!-- Language Toggle Button -->
    <div style="position: absolute; top: 20px; right: 20px; z-index: 100;">
        <button onclick="I18n.toggle()" class="login-btn" style="padding: 6px 12px; font-size: 12px; width: auto;">EN / AR</button>
    </div>
    
    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
    <script>
        I18n.translateDOM();
        // Check if already logged in
        const tokens = JSON.parse(localStorage.getItem('craft_tokens') || 'null');
        if (tokens && tokens.access) {
            window.location.href = 'app.html';
        }

        const form = document.getElementById('login-form');
        const errorDiv = document.getElementById('login-error');
        const loginBtn = document.getElementById('login-btn');
        const btnText = document.getElementById('login-btn-text');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.classList.add('hidden');
            loginBtn.disabled = true;
            btnText.textContent = 'Signing in...';

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const result = await Auth.login(email, password);
                if (result.success) {
                    window.location.href = 'app.html';
                } else {
                    errorDiv.textContent = result.error || 'Invalid credentials. Please try again.';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error. Please check the API server.';
                errorDiv.classList.remove('hidden');
            } finally {
                loginBtn.disabled = false;
                btnText.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
